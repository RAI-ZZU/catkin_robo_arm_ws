arm_id: $(arg arm_id)
joint_names:
  - $(arg arm_id)_joint1
  - $(arg arm_id)_joint2
  - $(arg arm_id)_joint3
  - $(arg arm_id)_joint4
  - $(arg arm_id)_joint5
  - $(arg arm_id)_joint6
  - $(arg arm_id)_joint7

# Configure the threshold angle for printing joint limit warnings.
joint_limit_warning_threshold: 0.1 # [rad]
# Activate rate limiter? [true|false]
rate_limiting: true
# Cutoff frequency of the low-pass filter. Set to >= 1000 to deactivate.
cutoff_frequency: 100
# Internal controller for motion generators [joint_impedance|cartesian_impedance]
internal_controller: joint_impedance
# Used to decide whether to enforce realtime mode [enforce|ignore]
realtime_config: enforce
# Configure the initial defaults for the collision behavior reflexes.
collision_config:
  # 扭矩阈值（单位：Nm）- 针对 7 个关节
  # 建议在默认基础上提升 1.5 - 2 倍，给动态惯性留出空间
  lower_torque_thresholds_acceleration: [40.0, 40.0, 36.0, 36.0, 32.0, 28.0, 24.0]
  upper_torque_thresholds_acceleration: [40.0, 40.0, 36.0, 36.0, 32.0, 28.0, 24.0]
  lower_torque_thresholds_nominal:      [40.0, 40.0, 36.0, 36.0, 32.0, 28.0, 24.0]
  upper_torque_thresholds_nominal:      [40.0, 40.0, 36.0, 36.0, 32.0, 28.0, 24.0]

  # 力阈值（单位：N 和 Nm）- 针对末端笛卡尔空间 [X, Y, Z, R, P, Y]
  # 将 20N 提高到 50N-60N，这是解决 "cartesian_reflex" 的关键
  lower_force_thresholds_acceleration: [60.0, 60.0, 60.0, 50.0, 50.0, 50.0]
  upper_force_thresholds_acceleration: [60.0, 60.0, 60.0, 50.0, 50.0, 50.0]
  lower_force_thresholds_nominal:      [60.0, 60.0, 60.0, 50.0, 50.0, 50.0]
  upper_force_thresholds_nominal:      [60.0, 60.0, 60.0, 50.0, 50.0, 50.0]